<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Café Menu</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="menu-container">

    <h1>Moonlight Café</h1>

    <div class="menu-section">

      <div class="card">
        <h2>Cappuccino</h2>
        <p>Fresh coffee with creamy milk.</p>
        <span>₹120</span>
      </div>

      <div class="card">
        <h2>Cold Coffee</h2>
        <p>Chilled coffee with chocolate flavor.</p>
        <span>₹150</span>
      </div>

      <div class="card">
        <h2>Veg Burger</h2>
        <p>Loaded burger with fresh veggies.</p>
        <span>₹180</span>
      </div>

      <div class="card">
        <h2>White Sauce Pasta</h2>
        <p>Italian pasta with creamy sauce.</p>
        <span>₹220</span>
      </div>

    </div>

  </div>

</body>
</html>
